# Prod-стек Pets Store: postgres + nest-api + nginx(spa).
# Запуск:  ./deploy.sh   (или вручную: docker compose up -d --build)
#
# Переменные читаются из файла .env рядом с этим compose-файлом
# (создаётся из .env.deploy.example скриптом deploy.sh).

services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app}
      POSTGRES_DB: ${DB_NAME:-petstore}
    volumes:
      - db-data:/var/lib/postgresql/data
      # Дамп схемы+данных. Выполняется ТОЛЬКО при первой инициализации
      # пустого тома db-data. Чтобы перезалить дамп — снести том (см. DEPLOY.md).
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-app} -d ${DB_NAME:-petstore}']
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [petnet]

  api:
    build:
      context: ./api-swagger
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-app}
      DB_PASSWORD: ${DB_PASSWORD:-app}
      DB_NAME: ${DB_NAME:-petstore}
      # Схемой управляют миграции (прогоняются при старте). НЕ включать auto-sync в проде.
      DB_SYNCHRONIZE: 'false'
      JWT_SECRET: ${JWT_SECRET:-change_me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      UPLOAD_DIR: /app/uploads
    volumes:
      # Загруженные файлы переживают пересборку. При первом старте том
      # наследует стартовые картинки, вшитые в образ (COPY uploads).
      - uploads:/app/uploads
    expose:
      - '3000'
    networks: [petnet]

  web:
    build:
      context: ./pets-store-web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-80}:80'
    networks: [petnet]

volumes:
  db-data:
  uploads:

networks:
  petnet:
