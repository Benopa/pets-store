server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Загрузка изображений товаров и аватаров (multipart) — разрешаем крупные тела.
    client_max_body_size 25m;

    # API → backend. Trailing slash в proxy_pass срезает префикс /api,
    # точно как vite-прокси в dev: /api/animals -> http://api:3000/animals.
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Загруженные файлы (картинки/аватары) — статика бэкенда.
    location /uploads/ {
        proxy_pass http://api:3000/uploads/;
        proxy_set_header Host $host;
    }

    # Swagger UI (опционально, удобно для отладки на сервере).
    location /docs {
        proxy_pass http://api:3000/docs;
        proxy_set_header Host $host;
    }

    # SPA-роутинг: любые «глубокие» маршруты отдаём в index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
